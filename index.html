<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Cigano</title>

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
  color:gold;
  font-family: Arial;
  text-align:center;
}

/* FUNDO ESTRELADO PROFUNDO */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* CONTEÚDO */
.container {
  position:relative;
  z-index:2;
  padding:30px;
}

h1 {
  font-size:30px;
  text-shadow:0 0 20px gold;
}

input {
  width:90%;
  max-width:350px;
  padding:15px;
  margin:10px;
  border-radius:25px;
  border:none;
  text-align:center;
  font-size:16px;
}

/* BOTÕES */
button {
  width:90%;
  max-width:350px;
  padding:16px;
  margin:10px;
  border-radius:30px;
  font-size:16px;
  cursor:pointer;
}

.botao-ouro {
  background:linear-gradient(145deg,#ffd700,#c9a646);
  box-shadow:0 0 25px gold;
  font-weight:bold;
}

.botao-pagamento {
  background:transparent;
  border:1px solid gold;
  color:gold;
}

/* PORTAL REAL */
.portal {
  position:fixed;
  width:200px;
  height:200px;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:radial-gradient(circle, gold 0%, transparent 70%);
  box-shadow:0 0 80px gold, inset 0 0 40px gold;
}

.portal.ativo {
  animation: portalAbrir 2s forwards;
}

@keyframes portalAbrir {
  0% {transform:translate(-50%,-50%) scale(0);}
  100% {transform:translate(-50%,-50%) scale(8);}
}

.mensagem {
  display:none;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<audio id="musica" loop>
<source src="ciganos.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>PORTAL DO BARALHO CIGANO</h1>
<p>Acesso exclusivo para membros do Clube do Tarô</p>

<input id="nome" placeholder="Seu nome completo">
<input id="email" placeholder="Seu email">

<button class="botao-ouro" onclick="ativarPortal()">OURO / DIAMANTE / ANUAL</button>

<a href="https://www.asaas.com/c/72mod50hzjnef58h" target="_blank">
<button class="botao-pagamento">BRONZE / PRATA</button>
</a>

<div class="mensagem" id="msg">
<h2>BEM VINDO AO CURSO DE BARALHO CIGANO</h2>
<p>Sua jornada começa agora.</p>
</div>

</div>

<div class="portal" id="portal"></div>

<script>

// FUNDO PROFUNDO COM MOVIMENTO REAL
let canvas = document.getElementById("bg");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<300;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    speed: Math.random()*0.5
  });
}

function animate(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="gold";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y += p.speed;

    if(p.y > canvas.height){
      p.y = 0;
      p.x = Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(animate);
}
animate();

// ATIVAÇÃO
function ativarPortal(){

  let nome = document.getElementById("nome").value;
  let email = document.getElementById("email").value;

  if(!nome || !email){
    alert("Preencha os dados");
    return;
  }

  document.getElementById("musica").play();

  fetch("https://script.google.com/macros/s/AKfycbznKcdNZ6pji8ENBuQm5geoEFziLP5WWv5NeeX2OhNU3hUuKpqCaNfSClfzt8oDjqFp/exec", {
    method:"POST",
    body:JSON.stringify({nome,email})
  });

  document.getElementById("portal").classList.add("ativo");

  setTimeout(()=>{
    document.getElementById("msg").style.display="block";
  },2000);
}
</script>

</body>
</html>
